<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инвентарь — MAJESTIC CASES</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="inventory">

<div id="particles" class="particles"></div>

<header id="header" class="header">
    <div class="header-inner">
        <a href="index.html" class="logo">
            <span class="logo-icon">💎</span>
            <span class="logo-text">MAJESTIC<span class="logo-accent">CASES</span></span>
        </a>
        <nav class="nav">
            <a href="index.html" class="nav-link">🎰 Кейсы</a>
            <a href="inventory.html" class="nav-link active">🎒 Инвентарь</a>
            <a href="profile.html" class="nav-link">👤 Профиль</a>
        </nav>
        <div class="header-right">
            <div class="balance" onclick="openDeposit()">
                <span class="balance-icon">💎</span>
                <span class="balance-amount">0</span>
                <span class="balance-plus">+</span>
            </div>
            <button class="btn-sound" id="soundToggle" onclick="toggleSound()">🔊</button>
            <button class="btn-mobile-nav" onclick="toggleMobileNav()">☰</button>
        </div>
    </div>
</header>

<section class="inventory-section">
    <div class="inventory-header">
        <h1 class="inventory-title">🎒 Мой инвентарь</h1>
        <button class="btn-sell-all" onclick="sellAllInventory()">💰 Продать всё</button>
    </div>
    <div class="inventory-stats">
        <div class="inv-stat"><span class="inv-stat-value" id="statTotalItems">0</span><span class="inv-stat-label">Предметов</span></div>
        <div class="inv-stat"><span class="inv-stat-value" id="statTotalValue">0</span><span class="inv-stat-label">💎 Общая стоимость</span></div>
        <div class="inv-stat"><span class="inv-stat-value" id="statBestItem">—</span><span class="inv-stat-label">Лучший предмет</span></div>
        <div class="inv-stat"><span class="inv-stat-value" id="statTotalCases">0</span><span class="inv-stat-label">Кейсов открыто</span></div>
    </div>
    <div class="inventory-controls">
        <input type="text" id="invSearch" class="inv-search" placeholder="🔍 Поиск предмета..." oninput="searchInventory(this.value)">
        <select id="invSort" class="inv-sort" onchange="sortInventory(this.value)">
            <option value="date">По дате</option>
            <option value="value-desc">Цена ↓</option>
            <option value="value-asc">Цена ↑</option>
            <option value="rarity">По редкости</option>
            <option value="name">По имени</option>
        </select>
    </div>
    <div id="inventoryGrid" class="inventory-grid"></div>
</section>

<div id="depositModal" class="modal-overlay" onclick="if(event.target===this)closeDeposit()">
    <div class="modal-box">
        <button class="modal-close" onclick="closeDeposit()">✕</button>
        <div class="modal-title">💎 Пополнение баланса</div>
        <div class="deposit-amounts">
            <button class="deposit-btn" onclick="setDepositAmount(1000)">1 000</button>
            <button class="deposit-btn" onclick="setDepositAmount(5000)">5 000</button>
            <button class="deposit-btn" onclick="setDepositAmount(10000)">10 000</button>
            <button class="deposit-btn" onclick="setDepositAmount(50000)">50 000</button>
        </div>
        <div class="deposit-custom">
            <input type="number" id="depositInput" placeholder="Введите сумму" min="1">
            <button class="deposit-confirm" onclick="confirmDeposit()">Пополнить</button>
        </div>
    </div>
</div>

<div id="notification" class="notification">
    <span id="notifIcon" class="notif-icon">✅</span>
    <span id="notifText" class="notif-text">Текст</span>
</div>

<script src="js/app.js"></script>
</body>
</html>
