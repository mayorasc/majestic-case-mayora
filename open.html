<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Открытие кейса — MAJESTIC CASES</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="open">

<div id="particles" class="particles"></div>

<header id="header" class="header">
    <div class="header-inner">
        <a href="index.html" class="logo">
            <span class="logo-icon">💎</span>
            <span class="logo-text">MAJESTIC<span class="logo-accent">CASES</span></span>
        </a>
        <nav class="nav">
            <a href="index.html" class="nav-link">🎰 Кейсы</a>
            <a href="inventory.html" class="nav-link">🎒 Инвентарь</a>
            <a href="profile.html" class="nav-link">👤 Профиль</a>
        </nav>
        <div class="header-right">
            <div class="balance" onclick="openDeposit()">
                <span class="balance-icon">💎</span>
                <span class="balance-amount">0</span>
                <span class="balance-plus">+</span>
            </div>
            <button class="btn-sound" id="soundToggle" onclick="toggleSound()">🔊</button>
            <button class="btn-mobile-nav" onclick="toggleMobileNav()">☰</button>
        </div>
    </div>
</header>

<section class="open-case-info">
    <a href="index.html" class="back-link">← Назад к кейсам</a>
    <div class="open-case-header">
        <div class="open-case-icon" id="openCaseIcon">📦</div>
        <div>
            <h1 class="open-case-title" id="openCaseTitle">Кейс</h1>
            <p class="open-case-desc" id="openCaseDesc">Описание</p>
        </div>
        <div class="open-case-price" id="openCasePrice">💎 0</div>
    </div>
</section>

<section id="rouletteSection" class="roulette-section">
    <div class="roulette-container">
        <div class="roulette-pointer"></div>
        <div class="roulette-viewport">
            <div id="rouletteTrack" class="roulette-track"></div>
        </div>
    </div>
</section>

<div id="actionsSection" class="open-actions">
    <button id="btnOpenCase" class="btn-open" onclick="spinRoulette(false)">
        🎰 Открыть кейс <span class="price-tag" id="openBtnPrice">💎 0</span>
    </button>
    <button id="btnFastOpen" class="btn-fast-open" onclick="spinRoulette(true)">
        ⚡ Быстро
    </button>
</div>

<div id="winScreen" class="win-screen">
    <div class="win-glow" id="winGlowBg"></div>
    <div class="win-content">
        <div class="win-label">🎉 Вы выиграли!</div>
        <div class="win-icon" id="winIcon">🎁</div>
        <div class="win-rarity" id="winRarity">Обычный</div>
        <div class="win-item-name" id="winItemName">Предмет</div>
        <div class="win-item-value" id="winItemValue">💎 0</div>
        <div class="win-buttons">
            <button class="win-btn sell" onclick="sellWinItem()">💰 Продать</button>
            <button class="win-btn take" onclick="takeWinItem()">✅ Забрать</button>
            <button class="win-btn again" onclick="playAgain()">🔄 Ещё раз</button>
        </div>
    </div>
</div>

<section id="contentsSection" class="contents-section">
    <h2 class="contents-title">📋 Содержимое кейса</h2>
    <div id="caseContentsGrid" class="contents-grid"></div>
</section>

<div id="depositModal" class="modal-overlay" onclick="if(event.target===this)closeDeposit()">
    <div class="modal-box">
        <button class="modal-close" onclick="closeDeposit()">✕</button>
        <div class="modal-title">💎 Пополнение баланса</div>
        <div class="deposit-amounts">
            <button class="deposit-btn" onclick="setDepositAmount(1000)">1 000</button>
            <button class="deposit-btn" onclick="setDepositAmount(5000)">5 000</button>
            <button class="deposit-btn" onclick="setDepositAmount(10000)">10 000</button>
            <button class="deposit-btn" onclick="setDepositAmount(50000)">50 000</button>
        </div>
        <div class="deposit-custom">
            <input type="number" id="depositInput" placeholder="Введите сумму" min="1">
            <button class="deposit-confirm" onclick="confirmDeposit()">Пополнить</button>
        </div>
    </div>
</div>

<div id="notification" class="notification">
    <span id="notifIcon" class="notif-icon">✅</span>
    <span id="notifText" class="notif-text">Текст</span>
</div>

<div id="confettiContainer" class="confetti-container"></div>

<script src="js/app.js"></script>
</body>
</html>
